<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Tone Trainer</title>
<style>
  :root{
    --paper:#FAF6EE;
    --ink:#221F1A;
    --ink-soft:#5B564C;
    --seal:#B8392B;
    --seal-soft:#E8C9C2;
    --jade:#3E6259;
    --jade-soft:#D9E5E0;
    --line:#E3DCCB;
    --radius:16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;
    padding:0 0 60px;
  }
  .wrap{max-width:480px;margin:0 auto;padding:24px 20px;}

  header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;}
  header h1{font-size:22px;margin:0 0 2px;letter-spacing:-0.01em;}
  header p{margin:0;font-size:13px;color:var(--ink-soft);}
  .score{
    background:var(--jade-soft);
    color:var(--jade);
    font-weight:600;
    font-size:13px;
    padding:6px 12px;
    border-radius:999px;
    white-space:nowrap;
  }

  .segmented{
    display:flex;
    background:#F0EADA;
    border-radius:999px;
    padding:4px;
    margin-bottom:20px;
  }
  .segmented button{
    flex:1;
    border:none;
    background:transparent;
    padding:10px 0;
    font-size:14px;
    font-weight:600;
    color:var(--ink-soft);
    border-radius:999px;
    cursor:pointer;
  }
  .segmented button.active{
    background:var(--ink);
    color:var(--paper);
  }

  .stage{
    background:white;
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:28px 20px;
    text-align:center;
    margin-bottom:20px;
  }
  .play-btn{
    width:84px;height:84px;
    border-radius:50%;
    border:none;
    background:var(--seal);
    color:white;
    font-size:32px;
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 12px;
    cursor:pointer;
    box-shadow:0 6px 16px rgba(184,57,43,0.28);
  }
  .play-btn:active{transform:scale(0.96);}
  .play-hint{font-size:12px;color:var(--ink-soft);}

  label.field-label{
    display:block;
    font-size:12px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:0.04em;
    color:var(--ink-soft);
    margin-bottom:8px;
  }

  input[type=text]{
    width:100%;
    font-size:18px;
    padding:14px 16px;
    border-radius:12px;
    border:1px solid var(--line);
    background:white;
    margin-bottom:20px;
  }
  input[type=text]:focus{outline:2px solid var(--seal);outline-offset:1px;}
  input[type=text]:disabled{background:#F3EFE3;color:var(--ink-soft);}

  .tones{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
    margin-bottom:24px;
  }
  .tone-btn{
    background:white;
    border:1.5px solid var(--line);
    border-radius:12px;
    padding:10px 4px 8px;
    cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:4px;
  }
  .tone-btn:disabled{opacity:0.5;cursor:default;}
  .tone-btn svg{width:32px;height:22px;}
  .tone-btn path{stroke:var(--ink-soft);stroke-width:2.4;fill:none;stroke-linecap:round;}
  .tone-btn span{font-size:12px;color:var(--ink-soft);font-weight:600;}
  .tone-btn.selected{border-color:var(--seal);background:var(--seal-soft);}
  .tone-btn.selected path{stroke:var(--seal);}
  .tone-btn.selected span{color:var(--seal);}

  .submit-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:var(--ink);
    color:var(--paper);
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    margin-bottom:10px;
  }
  .skip-btn{
    width:100%;
    padding:12px;
    border:1px solid var(--line);
    border-radius:12px;
    background:transparent;
    color:var(--ink-soft);
    font-size:14px;
    cursor:pointer;
  }
  .skip-btn:disabled{opacity:0.5;cursor:default;}

  .hidden{display:none !important;}

  .feedback{
    margin-top:18px;
    padding:16px;
    border-radius:12px;
    text-align:center;
    display:none;
  }
  .feedback.correct{display:block;background:var(--jade-soft);color:var(--jade);}
  .feedback.incorrect{display:block;background:var(--seal-soft);color:var(--seal);}
  .feedback.reveal{display:block;background:#F0EADA;color:var(--ink-soft);}
  .feedback .answer{
    font-size:28px;
    margin:6px 0 2px;
    color:var(--ink);
  }
  .feedback .meaning{font-size:13px;color:var(--ink-soft);margin-bottom:10px;}
  .feedback button{
    border:none;
    background:white;
    padding:8px 14px;
    border-radius:999px;
    font-size:13px;
    cursor:pointer;
    color:var(--ink);
  }

  .syll-breakdown{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:8px;
    margin:10px 0;
  }
  .syll-chip{
    border-radius:10px;
    padding:6px 10px;
    font-size:14px;
    font-weight:700;
    min-width:44px;
  }
  .syll-chip.correct{background:var(--jade-soft);color:var(--jade);}
  .syll-chip.wrong{background:var(--seal-soft);color:var(--seal);}
  .syll-chip.wrong .syll-guess{text-decoration:line-through;opacity:0.8;}
  .syll-correct{font-size:12px;color:var(--ink);margin-top:2px;font-weight:700;}

  .feedback-buttons{
    display:flex;
    gap:8px;
    justify-content:center;
    margin-top:8px;
  }
  .feedback-buttons button{flex:1;}
  #nextBtn{
    background:var(--ink);
    color:var(--paper);
    font-weight:700;
  }

  .voice-warning{
    display:none;
    font-size:12px;
    color:var(--seal);
    background:var(--seal-soft);
    border-radius:10px;
    padding:10px 12px;
    margin-bottom:16px;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <h1>Tone Trainer</h1>
      <p>Listen, then type the pinyin and pick the tone</p>
    </div>
    <div class="score" id="score">0 / 0</div>
  </header>

  <div class="voice-warning" id="voiceWarning">
    No Mandarin voice found on this device. Install a Chinese (zh-CN) voice in your phone's text-to-speech / accessibility settings.
  </div>

  <div class="segmented">
    <button id="modeSounds" class="active">Single sounds</button>
    <button id="modeWords">Real words</button>
  </div>

  <div class="stage">
    <button class="play-btn" id="playBtn" aria-label="Play sound">🔊</button>
    <div class="play-hint">Tap to hear it</div>
  </div>

  <form id="answerForm">
    <label class="field-label" id="pinyinLabel" for="pinyinInput">Pinyin (no tone marks)</label>
    <input type="text" id="pinyinInput" placeholder="e.g. ma" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
    <div id="pinyinHint" style="display:none;font-size:11px;color:var(--ink-soft);margin:-14px 0 18px;">Type ü as v (e.g. lü → lv)</div>

    <div id="toneSection">
      <label class="field-label">Tone</label>
      <div class="tones" id="toneButtons">
        <button type="button" class="tone-btn" data-tone="1">
          <svg viewBox="0 0 40 30"><path d="M5,8 L35,8"/></svg>
          <span>1</span>
        </button>
        <button type="button" class="tone-btn" data-tone="2">
          <svg viewBox="0 0 40 30"><path d="M5,22 L35,6"/></svg>
          <span>2</span>
        </button>
        <button type="button" class="tone-btn" data-tone="3">
          <svg viewBox="0 0 40 30"><path d="M5,10 Q14,26 20,26 Q26,26 35,6"/></svg>
          <span>3</span>
        </button>
        <button type="button" class="tone-btn" data-tone="4">
          <svg viewBox="0 0 40 30"><path d="M5,6 L35,24"/></svg>
          <span>4</span>
        </button>
      </div>
    </div>

    <button type="submit" class="submit-btn">Check</button>
  </form>
  <button class="skip-btn" id="skipBtn">Skip / next sound</button>

  <div class="feedback" id="feedback">
    <div id="feedbackTitle"></div>
    <div class="syll-breakdown" id="syllableBreakdown"></div>
    <div class="answer" id="feedbackAnswer"></div>
    <div class="meaning" id="feedbackMeaning"></div>
    <div class="feedback-buttons">
      <button type="button" id="hearAgainBtn">🔊 Hear it again</button>
      <button type="button" id="nextBtn">Next →</button>
    </div>
  </div>

</div>

// ---------- State ----------
let practiceMode = "sounds"; // "sounds" | "words"
let current = null;
let selectedTone = null;
let correctCount = 0, totalCount = 0;
let zhVoice = null;
let inputsLocked = false;
let revealTimeoutId = null;

// ---------- Voice setup ----------
function pickVoice(){
  const voices = window.speechSynthesis.getVoices();
  zhVoice = voices.find(v => v.lang && v.lang.toLowerCase().startsWith("zh")) || null;
  document.getElementById('voiceWarning').style.display = zhVoice ? "none" : "block";
}
if ('speechSynthesis' in window) {
  pickVoice();
  window.speechSynthesis.onvoiceschanged = pickVoice;
} else {
  document.getElementById('voiceWarning').style.display = "block";
  document.getElementById('voiceWarning').textContent = "This browser doesn't support text-to-speech. Try Chrome or Safari.";
}

function speak(text){
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "zh-CN";
  if (zhVoice) u.voice = zhVoice;
  u.rate = 0.85;
  window.speechSynthesis.speak(u);
}

// ---------- Pinyin / syllable helpers ----------
// Splits a continuous numbered-pinyin string like "gong1yuan2" into
// ["gong1","yuan2"]. Works on any run of letters immediately followed
// by a tone digit (1-5).
function parseSyllables(str){
  return (str.match(/[a-z]+[1-5]/g)) || [];
}

function superscriptTone(syll){
  const m = syll.match(/^([a-z]+)([1-5])$/);
  if (!m) return syll;
  const supers = {'1':'¹','2':'²','3':'³','4':'⁴','5':'⁵'};
  return m[1] + supers[m[2]];
}

function getGuessSyllables(){
  if (practiceMode === 'sounds') {
    const base = document.getElementById('pinyinInput').value.trim().toLowerCase().replace(/\s+/g, '');
    if (!base) return [];
    return [base + (selectedTone || '')];
  }
  const guess = document.getElementById('pinyinInput').value.trim().toLowerCase().replace(/\s+/g, '');
  return parseSyllables(guess);
}

function getExpectedSyllables(){
  if (practiceMode === 'sounds') {
    return [current.pinyin + current.tone];
  }
  return parseSyllables(current.pinyin);
}

function formatFullAnswer(){
  if (practiceMode === 'sounds') {
    return superscriptTone(current.pinyin + current.tone);
  }
  return parseSyllables(current.pinyin).map(superscriptTone).join(' ');
}

// ---------- Game logic ----------
function loadNew(){
  const pool = practiceMode === "sounds" ? DATA : WORDS;
  current = pool[Math.floor(Math.random() * pool.length)];
  selectedTone = null;
  document.getElementById('pinyinInput').value = "";
  document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('feedback').className = "feedback";
  document.getElementById('feedback').style.display = "none";
  document.getElementById('syllableBreakdown').innerHTML = "";
  lockInputs(false);
  document.getElementById('pinyinInput').focus();
}

function updateScore(){
  document.getElementById('score').textContent = `${correctCount} / ${totalCount}`;
}

document.getElementById('modeSounds').onclick = () => switchPracticeMode('sounds');
document.getElementById('modeWords').onclick = () => switchPracticeMode('words');
function switchPracticeMode(m){
  practiceMode = m;
  document.getElementById('modeSounds').classList.toggle('active', m === 'sounds');
  document.getElementById('modeWords').classList.toggle('active', m === 'words');
  document.getElementById('toneSection').style.display = m === 'sounds' ? '' : 'none';
  document.getElementById('pinyinLabel').textContent = m === 'sounds' ? 'Pinyin (no tone marks)' : 'Pinyin with tone numbers';
  document.getElementById('pinyinInput').placeholder = m === 'sounds' ? 'e.g. ma' : 'e.g. gong1yuan2';
  document.getElementById('pinyinHint').style.display = m === 'sounds' ? 'none' : 'block';
  correctCount = 0; totalCount = 0;
  updateScore();
  if (revealTimeoutId) { clearTimeout(revealTimeoutId); revealTimeoutId = null; }
  loadNew();
}

document.getElementById('playBtn').onclick = () => speak(current.char);
document.getElementById('hearAgainBtn').onclick = () => speak(current.char);
document.getElementById('skipBtn').onclick = revealAndAdvance;
document.getElementById('nextBtn').onclick = goToNext;

// Locks/unlocks the answer controls while feedback is on screen,
// swapping the Check/Skip buttons out for the Next button.
function lockInputs(locked){
  inputsLocked = locked;
  document.getElementById('pinyinInput').disabled = locked;
  document.querySelectorAll('.tone-btn').forEach(b => b.disabled = locked);
  document.getElementById('answerForm').querySelector('.submit-btn').classList.toggle('hidden', locked);
  document.getElementById('skipBtn').classList.toggle('hidden', locked);
}

function goToNext(){
  if (revealTimeoutId) { clearTimeout(revealTimeoutId); revealTimeoutId = null; }
  loadNew();
}

function revealAndAdvance(){
  lockInputs(true);

  const fb = document.getElementById('feedback');
  fb.style.display = "block";
  fb.className = "feedback reveal";
  document.getElementById('feedbackTitle').textContent = "Answer";
  document.getElementById('syllableBreakdown').innerHTML = "";
  document.getElementById('feedbackAnswer').textContent = `${current.char}  ${formatFullAnswer()}`;
  document.getElementById('feedbackMeaning').textContent = current.meaning;

  revealTimeoutId = setTimeout(goToNext, 3000);
}

document.querySelectorAll('.tone-btn').forEach(btn => {
  btn.onclick = () => {
    selectedTone = parseInt(btn.dataset.tone, 10);
    document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  };
});

// Builds the row of per-syllable chips for "real words" mode, marking
// each syllable green (right) or red (wrong), and showing the correct
// syllable underneath any wrong one.
function buildSyllableRow(guessSylls, expectedSylls){
  const len = Math.max(guessSylls.length, expectedSylls.length);
  let html = '';
  for (let i = 0; i < len; i++){
    const g = guessSylls[i];
    const ex = expectedSylls[i];
    const ok = g !== undefined && g === ex;
    html += `<div class="syll-chip ${ok ? 'correct' : 'wrong'}">`;
    html += `<div class="syll-guess">${g ? superscriptTone(g) : '—'}</div>`;
    if (!ok) {
      html += `<div class="syll-correct">${ex ? superscriptTone(ex) : ''}</div>`;
    }
    html += `</div>`;
  }
  return html;
}

// For "single sounds" mode there's only one syllable, so instead of a
// single pass/fail chip we break it into a pinyin chip and a tone chip
// so the learner can see exactly which part was wrong.
function buildSoundsBreakdown(){
  const guessBase = document.getElementById('pinyinInput').value.trim().toLowerCase().replace(/\s+/g, '');
  const pinyinOk = guessBase === current.pinyin;
  const toneOk = selectedTone === current.tone;
  let html = '';
  html += `<div class="syll-chip ${pinyinOk ? 'correct' : 'wrong'}">`;
  html += `<div class="syll-guess">${guessBase || '—'}</div>`;
  if (!pinyinOk) html += `<div class="syll-correct">${current.pinyin}</div>`;
  html += `</div>`;
  html += `<div class="syll-chip ${toneOk ? 'correct' : 'wrong'}">`;
  html += `<div class="syll-guess">tone ${selectedTone || '—'}</div>`;
  if (!toneOk) html += `<div class="syll-correct">tone ${current.tone}</div>`;
  html += `</div>`;
  return html;
}

function showFeedback(isCorrect, guessSylls, expectedSylls){
  lockInputs(true);
  const fb = document.getElementById('feedback');
  fb.style.display = 'block';
  fb.className = 'feedback ' + (isCorrect ? 'correct' : 'incorrect');

  document.getElementById('feedbackTitle').textContent = isCorrect
    ? 'Correct! 🎉'
    : 'Not quite — check the syllable(s) below';

  const breakdownEl = document.getElementById('syllableBreakdown');
  if (isCorrect) {
    breakdownEl.innerHTML = '';
  } else if (practiceMode === 'sounds') {
    breakdownEl.innerHTML = buildSoundsBreakdown();
  } else {
    breakdownEl.innerHTML = buildSyllableRow(guessSylls, expectedSylls);
  }

  document.getElementById('feedbackAnswer').textContent = `${current.char}  ${formatFullAnswer()}`;
  document.getElementById('feedbackMeaning').textContent = current.meaning;
}

document.getElementById('answerForm').onsubmit = (e) => {
  e.preventDefault();
  if (inputsLocked) return;

  const needsToneSelection = practiceMode === "sounds";
  const guessRaw = document.getElementById('pinyinInput').value.trim();

  if (!guessRaw || (needsToneSelection && !selectedTone)) {
    alert(needsToneSelection ? "Type the pinyin and pick a tone first." : "Type the pinyin with tone numbers first.");
    return;
  }

  const guessSylls = getGuessSyllables();
  const expectedSylls = getExpectedSyllables();
  const isCorrect = guessSylls.length === expectedSylls.length &&
                     guessSylls.every((s, i) => s === expectedSylls[i]);

  totalCount++;
  if (isCorrect) correctCount++;
  updateScore();

  showFeedback(isCorrect, guessSylls, expectedSylls);
};

// ---------- Init ----------
loadNew();
updateScore();
